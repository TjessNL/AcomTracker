<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AcomTracker</title>
    <base href="/" />
    <link rel="stylesheet" href="css/app.css" />
</head>

<body>
    <div id="app">
        <div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px;background:#f1f5f9">
            <div style="width:40px;height:40px;border:3px solid #e2e8f0;border-top-color:#6366f1;border-radius:50%;animation:spin 0.8s linear infinite"></div>
            <p style="font-family:system-ui,sans-serif;font-size:13px;color:#94a3b8;margin:0">Loading AcomTracker...</p>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <span class="dismiss">&#10006;</span>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>

    <style>
        @keyframes spin { to { transform: rotate(360deg); } }

        #blazor-error-ui {
            background: #fee2e2;
            bottom: 0;
            box-shadow: 0 -1px 2px rgba(0,0,0,0.2);
            display: none;
            left: 0;
            padding: 0.6rem 1.25rem 0.7rem;
            position: fixed;
            width: 100%;
            z-index: 1000;
            font-family: system-ui, sans-serif;
            font-size: 13px;
            color: #991b1b;
        }

        #blazor-error-ui .dismiss { cursor: pointer; margin-left: 12px; }
        #blazor-error-ui .reload { color: #991b1b; font-weight: 600; }
    </style>
</body>

</html>
